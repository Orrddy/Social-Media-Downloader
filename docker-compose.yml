version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PROJECT_NAME=Media Downloader API Local
      - ALLOWED_HOSTS=["http://localhost:3000", "http://127.0.0.1:5500", "http://localhost:8080"]
      - RATE_LIMIT_DEFAULT=100 per minute
    # Uncomment to map a local cookies file explicitly
    # secrets:
    #   - source: yt_cookies
    #     target: /app/cookies.txt

# secrets:
#   yt_cookies:
#     file: ./local_cookies.txt
